<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Example</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:300px;
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    transition:0.3s ease;
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card-content{
    padding:20px;
}

.card-content h2{
    margin-bottom:10px;
    color:#333;
}

.card-content p{
    color:#666;
    line-height:1.5;
    margin-bottom:20px;
}

button{
    background:#6F4E37;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#4B3222;
}
</style>

</head>
<body>

<div class="card">
    <img src="https://picsum.photos/300/200" alt="Coffee">

    <div class="card-content">
        <h2>Coffee Latte</h2>

        <p>
            Enjoy a freshly brewed coffee made with premium beans and creamy milk.
        </p>

        <button>Order Now</button>
    </div>
</div>

</body>
</html>
